<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🏒 Timmys Picks — Hockey Scorer Odds</title>
<meta name="description" content="Daily NHL player scorer odds for the Tim Hortons Hockey Challenge">
<meta name="theme-color" content="#c8102e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timmys Picks">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#c8102e;--red-dark:#9b0c22;--red-glow:rgba(200,16,46,0.4);
  --gold:#f4a700;--dark:#08111e;--dark2:#0f1a2e;--dark3:#162033;--card:#0f1824;
  --text:#e8edf5;--muted:#6b7fa0;--muted2:#4a5a78;
  --green:#22c55e;--gdim:rgba(34,197,94,0.12);--orange:#f97316;--blue:#38bdf8;
  --border:rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 100% 50% at 50% -5%,rgba(200,16,46,0.22) 0%,transparent 65%),
  radial-gradient(ellipse 60% 30% at 80% 80%,rgba(56,189,248,0.04) 0%,transparent 60%);}

/* HEADER */
header{text-align:center;padding:26px 20px 16px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px);pointer-events:none;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:5px;}
.puck{width:52px;height:52px;background:#0a0a0a;border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 0 24px var(--red-glow);animation:pulse 3s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{box-shadow:0 0 24px var(--red-glow)}50%{box-shadow:0 0 40px var(--red-glow),0 0 80px rgba(200,16,46,0.18)}}
.h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,3.5rem);letter-spacing:3px;line-height:0.95;background:linear-gradient(135deg,#fff 40%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hsub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.hbadges{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.hb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;}
.hb-red{background:var(--red);color:white;}
.hb-gold{border:1px solid rgba(244,167,0,0.4);color:var(--gold);background:rgba(244,167,0,0.08);}

/* STATUS BAR */
.statusbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.live-ind{display:flex;align-items:center;gap:7px;font-size:0.78rem;font-weight:600;color:var(--green);}
.ldot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.12}}
#clock{font-family:'Barlow Condensed',sans-serif;font-size:0.92rem;font-weight:600;color:var(--gold);letter-spacing:0.5px;}

/* DAY SWITCHER */
.day-sw{background:var(--dark3);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;}
.dbtn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.22s;line-height:1.2;text-align:center;}
.dbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.18);}
.dbtn.active{background:var(--red);border-color:var(--red);color:white;box-shadow:0 0 18px rgba(200,16,46,0.4);}
.dbtn .ddate{display:block;font-size:0.62rem;font-weight:600;opacity:0.72;margin-top:1px;letter-spacing:0.5px;}
.dloading{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;color:var(--muted);margin-left:8px;opacity:0;transition:opacity 0.2s;}
.dloading.show{opacity:1;}

/* PICKS BAR */
.picks-bar{background:linear-gradient(90deg,var(--dark3),rgba(200,16,46,0.07));border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.picks-slots{display:flex;gap:8px;}
.slot{width:48px;height:48px;border-radius:12px;border:2px dashed var(--muted2);display:flex;align-items:center;justify-content:center;font-size:0.58rem;color:var(--muted2);text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:0.5px;transition:all 0.25s;text-transform:uppercase;cursor:default;overflow:hidden;}
.slot.filled{border-color:var(--gold);border-style:solid;background:rgba(244,167,0,0.08);cursor:pointer;}
.slot.filled:hover{background:rgba(244,167,0,0.18);}
.ctext{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;}
.ctext span{color:var(--red);}
.csub{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.share-btn{margin-left:auto;background:var(--red);color:white;border:none;padding:9px 20px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.86rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.share-btn:hover{background:var(--red-dark);transform:translateY(-1px);}
.share-btn:disabled{background:var(--muted2);cursor:not-allowed;transform:none;}

/* CONTROLS */
.controls{padding:11px 20px;display:flex;gap:7px;flex-wrap:wrap;max-width:1200px;margin:0 auto;align-items:center;}
.fbtn{background:var(--dark3);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:0.86rem;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.16s;text-transform:uppercase;}
.fbtn:hover{border-color:rgba(200,16,46,0.4);color:var(--text);}
.fbtn.active{background:var(--red);border-color:var(--red);color:white;}

/* SEARCH */
.search-wrap{margin-left:auto;position:relative;}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.72rem;pointer-events:none;z-index:1;}
.search{background:var(--dark3);border:1px solid var(--border);color:white;padding:7px 14px 7px 30px;border-radius:8px;font-size:0.84rem;width:190px;outline:none;transition:border-color 0.2s;}
.search:focus{border-color:var(--gold);}
.search::placeholder{color:var(--muted2);}

/* SEARCH SPOTLIGHT DROPDOWN */
.spotlight{display:none;position:absolute;top:calc(100% + 6px);right:0;width:370px;background:var(--dark2);border:1px solid rgba(244,167,0,0.32);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.75);z-index:600;overflow:hidden;max-height:500px;overflow-y:auto;}
.spotlight.open{display:block;animation:spDrop 0.18s ease;}
@keyframes spDrop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.sp-hdr{padding:9px 14px 7px;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(244,167,0,0.04);}
.sp-row{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.13s;}
.sp-row:hover{background:rgba(255,255,255,0.04);}
.sp-row:last-child{border-bottom:none;}
.sp-row.sp-picked{background:rgba(244,167,0,0.05);}
.sp-img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--dark3);flex-shrink:0;}
.sp-fb{width:40px;height:40px;border-radius:50%;background:var(--dark3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--muted);flex-shrink:0;}
.sp-info{flex:1;min-width:0;}
.sp-name{font-family:'Barlow Condensed',sans-serif;font-size:0.92rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-meta{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.sp-game{font-size:0.66rem;color:var(--blue);margin-top:2px;}
.sp-odds{text-align:right;flex-shrink:0;min-width:58px;}
.sp-pct{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;line-height:1;}
.sp-bar-w{width:44px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin:3px 0 2px auto;overflow:hidden;}
.sp-bar{height:100%;border-radius:2px;}
.sp-lbl{font-size:0.57rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.sp-empty{padding:18px 14px;text-align:center;color:var(--muted);font-size:0.84rem;}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:0 16px 120px;position:relative;}
.main-fade{transition:opacity 0.22s ease;}
.main-fade.fading{opacity:0;}

.gsec{margin-bottom:22px;animation:fadeUp 0.35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.ghdr{display:flex;align-items:center;gap:9px;padding:11px 16px;background:var(--dark3);border-radius:12px 12px 0 0;border:1px solid var(--border);border-bottom:none;position:relative;overflow:hidden;flex-wrap:wrap;gap:8px;}
.ghdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);}
.tlogos{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tlogo{width:26px;height:26px;object-fit:contain;}
.tlogo-fb{width:26px;height:26px;border-radius:5px;background:var(--dark);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:700;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:var(--muted2);}
.mtxt{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.gtag{display:inline-flex;align-items:center;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;}
.ge{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.28);}
.ga{background:rgba(244,167,0,0.1);color:var(--gold);border:1px solid rgba(244,167,0,0.28);}
.gt{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.28);}
.gtime{color:var(--gold);font-size:0.82rem;font-weight:600;font-family:'Barlow Condensed',sans-serif;margin-left:auto;white-space:nowrap;}
.gst{font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.st-live{background:var(--gdim);color:var(--green);border:1px solid rgba(34,197,94,0.38);}
.st-up{background:rgba(244,167,0,0.09);color:var(--gold);border:1px solid rgba(244,167,0,0.28);}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(296px,1fr));border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.pcard{background:var(--card);padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;cursor:pointer;transition:background 0.14s;position:relative;}
.pcard:hover{background:#131f30;}
.pcard.picked{background:rgba(244,167,0,0.055);border-left:3px solid var(--gold);}
.pcard.maxed{opacity:0.4;cursor:not-allowed;}
.pcard.maxed:hover{background:var(--card);}
.pcard.injured{opacity:0.48;}

.hw{position:relative;flex-shrink:0;}
.hs{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--dark3);transition:border-color 0.2s;}
.pcard.picked .hs{border-color:var(--gold);}
.hsfb{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--dark3),var(--dark2));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--muted);}
.injb{position:absolute;bottom:-2px;right:-2px;width:15px;height:15px;border-radius:50%;background:#ef4444;border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:0.5rem;}

.pi{flex:1;min-width:0;}
.pn{font-family:'Barlow Condensed',sans-serif;font-size:0.98rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm{display:flex;align-items:center;gap:4px;margin-top:2px;flex-wrap:wrap;}
.tpill{background:rgba(200,16,46,0.17);color:#ff8090;font-size:0.63rem;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:0.5px;}
.postag{color:var(--muted);font-size:0.72rem;}
.pppill{background:rgba(56,189,248,0.12);color:var(--blue);font-size:0.63rem;font-weight:700;padding:1px 5px;border-radius:4px;}

.l5{display:flex;gap:3px;margin-top:5px;align-items:center;}
.d5{width:10px;height:10px;border-radius:50%;background:var(--muted2);flex-shrink:0;}
.d5.s{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,0.5);}
.l5lbl{font-size:0.6rem;color:var(--muted);margin-left:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;}

.srow{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.sc{font-size:0.61rem;color:var(--muted);background:rgba(255,255,255,0.04);padding:2px 5px;border-radius:4px;}
.sc strong{color:var(--text);}

.stk{display:inline-flex;align-items:center;gap:3px;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:3px;}
.stk-f{background:rgba(34,197,94,0.1);color:var(--green);}
.stk-w{background:rgba(244,167,0,0.1);color:var(--gold);}

.oc{text-align:right;min-width:68px;flex-shrink:0;}
.on{font-family:'Bebas Neue',sans-serif;font-size:1.95rem;line-height:1;}
.otrack{width:52px;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;margin:3px 0 2px auto;overflow:hidden;}
.ofill{height:100%;border-radius:2px;transition:width 0.65s ease;}
.olbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.ts{color:#4ade80;}.ts .ofill{background:#4ade80;}
.ta{color:var(--green);}.ta .ofill{background:var(--green);}
.tb{color:var(--gold);}.tb .ofill{background:var(--gold);}
.tc{color:var(--orange);}.tc .ofill{background:var(--orange);}
.td{color:var(--muted);}.td .ofill{background:var(--muted);}

.pchk{position:absolute;top:6px;right:7px;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;color:var(--gold);letter-spacing:1px;}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--dark3);border:1px solid var(--border);padding:9px 20px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.92rem;letter-spacing:0.5px;z-index:900;transition:transform 0.28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 10px 36px rgba(0,0,0,0.6);}
.toast.show{transform:translateX(-50%) translateY(0);}
.tok{border-color:var(--green);color:var(--green);}
.twrn{border-color:var(--gold);color:var(--gold);}
.terr{border-color:#f87171;color:#f87171;}

/* INSTALL BANNER */
.instb{display:none;background:var(--dark3);border-top:1px solid var(--border);padding:10px 20px;align-items:center;gap:12px;flex-wrap:wrap;position:fixed;bottom:0;left:0;right:0;z-index:300;}
.instb.show{display:flex;}
.instbtn{background:var(--red);color:white;border:none;padding:7px 16px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.84rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.instx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;margin-left:auto;}

.sp-searching{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--border);}
.sp-spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:sp 0.7s linear infinite;flex-shrink:0;}
.sp-row.sp-nogame{opacity:0.55;}
.sp-row.sp-nogame:hover{opacity:0.78;}

/* SPINNER / EMPTY */
.spin-wrap{text-align:center;padding:56px 20px;}
.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,0.07);border-top-color:var(--red);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-msg{color:var(--muted);font-size:0.88rem;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}

@media(max-width:640px){
  .pgrid{grid-template-columns:1fr;}
  .search{width:130px;}
  .gtime{display:none;}
  .spotlight{width:calc(100vw - 24px);right:-60px;}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="logo-row">
    <div class="puck">🏒</div>
    <div>
      <div class="h1">Timmys Picks</div>
      <div class="hsub">NHL Scorer Odds · 2025–26</div>
    </div>
  </div>
  <div class="hbadges">
    <span class="hb hb-red">🍩 Tim Hortons Challenge</span>
    <span class="hb hb-gold">📍 Vancouver Time (PT)</span>
  </div>
</header>

<div class="statusbar">
  <div class="live-ind"><div class="ldot"></div><span id="liveStatus">Loading NHL data...</span></div>
  <div id="clock"></div>
</div>

<div class="day-sw">
  <button class="dbtn active" id="db0" onclick="switchDay(0)">
    📅 Today
    <span class="ddate" id="dl0"></span>
  </button>
  <button class="dbtn" id="db1" onclick="switchDay(1)">
    📆 Tomorrow
    <span class="ddate" id="dl1"></span>
  </button>
  <span class="dloading" id="dload">⏳ Loading...</span>
</div>

<div class="picks-bar">
  <div>
    <div class="ctext">My Picks: <span id="pickCount">0</span> / 3</div>
    <div class="csub">Tim Hortons limit · tap slot to remove</div>
  </div>
  <div class="picks-slots">
    <div class="slot" id="sl0">Pick<br>1</div>
    <div class="slot" id="sl1">Pick<br>2</div>
    <div class="slot" id="sl2">Pick<br>3</div>
  </div>
  <button class="share-btn" id="shareBtn" onclick="sharePicks()" disabled>📋 Share Picks</button>
</div>

<div class="controls">
  <button class="fbtn active" id="fa" onclick="setFilter('all',this)">All</button>
  <button class="fbtn" onclick="setFilter('hot',this)">🔥 Best Odds</button>
  <button class="fbtn" onclick="setFilter('streak',this)">⚡ Streaks</button>
  <button class="fbtn" onclick="setFilter('pp',this)">🎯 PP Guys</button>
  <button class="fbtn" onclick="setFilter('healthy',this)">✅ Healthy Only</button>
  <div class="search-wrap">
    <input class="search" id="si" type="text" placeholder="Search player / team..." autocomplete="off" oninput="onSearch(this.value)">
    <div class="spotlight" id="sp"></div>
  </div>
</div>

<main id="main">
  <div class="spin-wrap"><div class="spin"></div><div class="spin-msg">Fetching today's games...</div></div>
</main>

<div class="instb" id="instb">
  <div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.88rem;">📲 Add to Home Screen</div>
    <div style="font-size:0.72rem;color:var(--muted);">Quick access every game day</div>
  </div>
  <button class="instbtn" id="instbtn">Install App</button>
  <button class="instx" onclick="document.getElementById('instb').classList.remove('show')">✕</button>
</div>

<script>
'use strict';

// ─── LOGOS & ASSETS ───────────────────────────────────────────────────────────
const LM={TOR:'TOR',MTL:'MTL',BOS:'BOS',BUF:'BUF',DET:'DET',OTT:'OTT',TB:'TBL',TBL:'TBL',
  FLA:'FLA',CAR:'CAR',CBJ:'CBJ',WSH:'WSH',NYR:'NYR',NYI:'NYI',NJ:'NJD',NJD:'NJD',
  PHI:'PHI',PIT:'PIT',CHI:'CHI',STL:'STL',NSH:'NSH',WPG:'WPG',MIN:'MIN',DAL:'DAL',
  COL:'COL',EDM:'EDM',CGY:'CGY',VAN:'VAN',SEA:'SEA',VGK:'VGK',ANA:'ANA',
  LA:'LAK',LAK:'LAK',SJ:'SJS',SJS:'SJS',UTA:'UTA'};

function logoEl(a){
  const c=LM[a]||LM[a?.toUpperCase()];
  return c
    ? `<img src="https://assets.nhle.com/logos/nhl/svg/${c}_light.svg" class="tlogo" alt="${a}" onerror="this.outerHTML='<div class=tlogo-fb>${a}</div>'">`
    : `<div class="tlogo-fb">${a||'?'}</div>`;
}
function hsEl(id,name,cls='hs',fbCls='hsfb'){
  const ini=(name||'??').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  return id
    ? `<img class="${cls}" src="https://assets.nhle.com/mugs/nhl/20252026/${id}.png" alt="${name}" onerror="this.outerHTML='<div class=${fbCls}>${ini}</div>'">`
    : `<div class="${fbCls}">${ini}</div>`;
}

// ─── GOALIE RATINGS ───────────────────────────────────────────────────────────
const GR={TOR:'avg',MTL:'easy',BOS:'tough',BUF:'avg',DET:'easy',OTT:'avg',TB:'avg',TBL:'avg',
  FLA:'tough',CAR:'tough',CBJ:'easy',WSH:'avg',NYR:'avg',NYI:'easy',NJ:'avg',NJD:'avg',
  PHI:'easy',PIT:'easy',CHI:'easy',STL:'avg',NSH:'avg',WPG:'tough',MIN:'avg',DAL:'tough',
  COL:'avg',EDM:'avg',CGY:'easy',VAN:'avg',SEA:'avg',VGK:'tough',ANA:'easy',
  LA:'avg',LAK:'avg',SJ:'easy',SJS:'easy',UTA:'avg'};

function goalieTag(opp){
  const r=GR[opp]||'avg';
  const m={easy:['ge','🟢 Easy Net'],avg:['ga','🟡 Avg Net'],tough:['gt','🔴 Tough Net']};
  const[c,l]=m[r];
  return `<span class="gtag ${c}">${l}</span>`;
}

// ─── ODDS ENGINE ──────────────────────────────────────────────────────────────
function calcOdds(p){
  if(p.injured) return 0;
  let s=p.gpg*72;
  if(p.streak>=6)s+=20; else if(p.streak>=4)s+=14; else if(p.streak>=2)s+=8;
  if(p.ppgPct>=0.38)s+=10; else if(p.ppgPct>=0.25)s+=5;
  if(p.spg>=3.8)s+=8; else if(p.spg>=2.8)s+=5; else if(p.spg>=2.0)s+=2;
  if(p.isHome)s+=2;
  const gr=GR[p.opp]||'avg';
  if(gr==='easy')s+=6; else if(gr==='tough')s-=5;
  return Math.round(Math.min(76,Math.max(8,s)));
}
function tierCls(o){return o>=62?'ts':o>=50?'ta':o>=36?'tb':o>=22?'tc':'td';}
function tierCol(o){return{ts:'#4ade80',ta:'#22c55e',tb:'#f4a700',tc:'#f97316',td:'#6b7fa0'}[tierCls(o)]||'#6b7fa0';}

// ─── STATE ────────────────────────────────────────────────────────────────────
const games={0:[],1:[]};        // games by day index
const loaded={0:false,1:false}; // whether day has been fetched
let curDay=0;
let picks=[];
const MAX_PICKS=3;
let activeFilter='all';
let searchTerm='';

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastT;
function showToast(msg,type='tok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

// ─── PICKS ────────────────────────────────────────────────────────────────────
function togglePick(name,team,id){
  const idx=picks.findIndex(p=>p.name===name);
  if(idx>-1){
    picks.splice(idx,1);
    showToast(`❌ Removed ${name.split(' ').pop()}`,'twrn');
  } else {
    if(picks.length>=MAX_PICKS){ showToast('⚠️ Max 3 picks! Remove one first.','terr'); return; }
    picks.push({name,team,id});
    showToast(`✅ Added ${name.split(' ').pop()}!`,'tok');
  }
  updatePicksUI();
  renderGames();
  renderSpotlight(document.getElementById('si').value);
}

function removePick(i){
  if(!picks[i]) return;
  const n=picks[i].name;
  picks.splice(i,1);
  showToast(`❌ Removed ${n.split(' ').pop()}`,'twrn');
  updatePicksUI();
  renderGames();
  renderSpotlight(document.getElementById('si').value);
}

function updatePicksUI(){
  document.getElementById('pickCount').textContent=picks.length;
  document.getElementById('shareBtn').disabled=picks.length===0;
  for(let i=0;i<3;i++){
    const sl=document.getElementById('sl'+i);
    if(picks[i]){
      const ini=picks[i].name.split(' ').map(w=>w[0]).join('').slice(0,2);
      sl.className='slot filled';
      sl.title=picks[i].name;
      sl.onclick=()=>removePick(i);
      sl.innerHTML=picks[i].id
        ? `<img src="https://assets.nhle.com/mugs/nhl/20252026/${picks[i].id}.png"
             style="width:38px;height:38px;border-radius:8px;object-fit:cover"
             onerror="this.outerHTML='<span style=\'font-family:Bebas Neue,sans-serif;font-size:1.1rem;color:var(--gold)\'>${ini}</span>'">`
        : `<span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold)">${ini}</span>`;
    } else {
      sl.className='slot'; sl.innerHTML=`Pick<br>${i+1}`; sl.title=''; sl.onclick=null;
    }
  }
}

function sharePicks(){
  if(!picks.length) return;
  const date=new Date().toLocaleDateString('en-CA',{timeZone:'America/Vancouver',month:'short',day:'numeric'});
  const lines=picks.map((p,i)=>`${['1️⃣','2️⃣','3️⃣'][i]} ${p.name} (${p.team})`).join('\n');
  const txt=`🏒 My Tim Hortons Challenge Picks – ${date}\n\n${lines}\n\n🍩 Powered by Timmys Picks\nhttps://timmys-picks.github.io/Hockey-Picker/`;
  if(navigator.share){ navigator.share({title:'My Timmys Picks',text:txt}).catch(()=>{}); }
  else { navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copied to clipboard!','tok')); }
}

// ─── SEARCH SPOTLIGHT ─────────────────────────────────────────────────────────
// Debounce timer and last query tracker
let spTimer=null, spLastQ='', spSearching=false;

function onSearch(val){
  searchTerm=val.toLowerCase().trim();
  if(!val.trim()) renderGames();
  clearTimeout(spTimer);
  spTimer=setTimeout(()=>runSpotlight(val),260);
}

function spRow(p, pickedSet){
  const o=calcOdds(p), col=tierCol(o);
  const isPicked=pickedSet.has(p.name);
  const sn=p.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const dayTag=p.day===0
    ? `<span style="color:var(--green);font-size:0.63rem;font-weight:700">TODAY</span>`
    : p.day===1
    ? `<span style="color:var(--blue);font-size:0.63rem;font-weight:700">TOMORROW</span>`
    : `<span style="color:var(--muted);font-size:0.63rem;font-weight:700">NO GAME</span>`;
  const gameInfo=p.gameLabel
    ? `${dayTag} · ${p.gameLabel}`
    : `${dayTag} · Not playing today/tomorrow`;
  const noGame=!p.gameLabel;
  return `<div class="sp-row${isPicked?' sp-picked':''}${noGame?' sp-nogame':''}"
      onclick="togglePick('${sn}','${p.team}',${p.id||'null'});document.getElementById('sp').classList.remove('open')">
    ${hsEl(p.id,p.name,'sp-img','sp-fb')}
    <div class="sp-info">
      <div class="sp-name">${p.name}${isPicked?' ✓':''}</div>
      <div class="sp-meta">
        <span style="background:rgba(200,16,46,0.17);color:#ff8090;font-size:0.62rem;font-weight:700;padding:1px 5px;border-radius:3px">${p.team}</span>
        ${p.pos} · <strong style="color:var(--text)">${p.goals}</strong>G · <strong style="color:var(--text)">${p.gpg.toFixed(2)}</strong>/gm
      </div>
      <div class="sp-game">${gameInfo}</div>
    </div>
    <div class="sp-odds" style="color:${noGame?'var(--muted)':col}">
      <div class="sp-pct">${noGame?'—':p.injured?'—':o+'%'}</div>
      <div class="sp-bar-w"><div class="sp-bar" style="width:${noGame||p.injured?0:o}%;background:${col}"></div></div>
      <div class="sp-lbl">${noGame?'no game':p.injured?'injured':'to score'}</div>
    </div>
  </div>`;
}

// Build a lookup of which players are in today/tomorrow games and their game info
function buildGameLookup(){
  const lookup={}; // playerName -> {day, gameLabel}
  [0,1].forEach(day=>{
    (games[day]||[]).forEach(g=>{
      g.players.forEach(p=>{
        if(!lookup[p.name]) lookup[p.name]={day, gameLabel:`${g.matchup} · ${g.time}`, opp:p.opp, isHome:p.isHome};
      });
    });
  });
  return lookup;
}

async function runSpotlight(val){
  const sp=document.getElementById('sp');
  const q=val.trim();
  if(!q){ sp.classList.remove('open'); sp.innerHTML=''; return; }
  if(q===spLastQ) return;
  spLastQ=q;

  // First: show local game results instantly
  const localResults=[], localSeen=new Set();
  const ql=q.toLowerCase();
  [0,1].forEach(day=>{
    (games[day]||[]).forEach(g=>{
      g.players.forEach(p=>{
        if(p.name.toLowerCase().includes(ql)||p.team.toLowerCase().includes(ql)){
          if(!localSeen.has(p.name)){
            localSeen.add(p.name);
            localResults.push({...p, gameLabel:`${g.matchup} · ${g.time}`, day});
          }
        }
      });
    });
  });
  localResults.sort((a,b)=>calcOdds(b)-calcOdds(a));

  // Show local results right away + a searching indicator
  const pickedSet=new Set(picks.map(p=>p.name));
  sp.innerHTML=`<div class="sp-hdr">🔍 Searching all NHL players...</div>`
    +(localResults.length ? localResults.map(p=>spRow(p,pickedSet)).join('') : '')
    +`<div class="sp-searching" id="sp-searching"><div class="sp-spin"></div> Looking up more players...</div>`;
  sp.classList.add('open');

  // Then: hit NHL search API for ANY player
  try{
    const r=await fetch(`https://search.d3.nhle.com/api/v1/search/player?culture=en-us&limit=20&q=${encodeURIComponent(q)}&active=true`,
      {signal:AbortSignal.timeout(4000)});
    if(!r.ok) throw new Error('search fail');
    const data=await r.json();

    // Build game lookup to check who's playing today/tomorrow
    const gameLookup=buildGameLookup();

    // Fetch stats for each result not already in local
    const apiResults=await Promise.all((data||[]).slice(0,12).map(async item=>{
      const name=`${item.firstName} ${item.lastName}`;
      if(localSeen.has(name)) return null; // already shown
      try{
        const land=await jf(`${NHL}/player/${item.playerId}/landing`);
        const s=land?.featuredStats?.regularSeason?.subSeason||{};
        const gp=s.gamesPlayed||1, goals=s.goals||0;
        let last5=[0,0,0,0,0], streak=0;
        try{
          const gl=await jf(`${NHL}/player/${item.playerId}/game-log/20252026/2`);
          const rec=(gl.gameLog||[]).slice(0,5);
          last5=rec.map(g=>(g.goals||0)>0?1:0);
          for(const g of rec){ if((g.goals||0)>0) streak++; else break; }
        }catch{}
        const teamAbbr=item.teamAbbrev||land?.currentTeamAbbrev||'NHL';
        const inGame=gameLookup[name];
        const injured=['IR','LTIR','DTD'].includes(item.injuryStatus||land?.playerSlug||'');
        return{
          id:item.playerId, name, team:teamAbbr,
          opp: inGame?.opp||'', isHome: inGame?.isHome||false,
          pos:item.positionCode||'?',
          gp, goals, gpg:goals/gp,
          ppgPct:goals>0?(s.powerPlayGoals||0)/goals:0,
          spg:(s.shots||0)/gp,
          streak, last5, injured,
          gameLabel: inGame?.gameLabel||null,
          day: inGame?.day??-1
        };
      }catch{return null;}
    }));

    const validApi=apiResults.filter(Boolean);
    validApi.sort((a,b)=>calcOdds(b)-calcOdds(a));

    // Combine: local first, then API extras
    const allResults=[...localResults,...validApi];
    if(!allResults.length){
      sp.innerHTML=`<div class="sp-hdr">🔍 No results for "${q}"</div><div class="sp-empty">Try a different name or team</div>`;
      sp.classList.add('open'); return;
    }

    const pickedSet2=new Set(picks.map(p=>p.name));
    sp.innerHTML=`<div class="sp-hdr">🔍 ${allResults.length} player${allResults.length!==1?'s':''} found · click to pick</div>`
      +allResults.map(p=>spRow(p,pickedSet2)).join('');
    sp.classList.add('open');

  }catch(e){
    // API failed — just show local results
    const el=document.getElementById('sp-searching');
    if(el) el.remove();
    if(!localResults.length){
      sp.innerHTML=`<div class="sp-hdr">🔍 "${q}"</div><div class="sp-empty">No results found</div>`;
    }
  }
}

// ─── DAY SWITCHER ─────────────────────────────────────────────────────────────
function switchDay(day){
  if(day===curDay && loaded[day]) return; // already there, no flicker
  curDay=day;

  // Update button states
  document.getElementById('db0').classList.toggle('active',day===0);
  document.getElementById('db1').classList.toggle('active',day===1);

  // Clear search
  document.getElementById('si').value='';
  searchTerm='';
  document.getElementById('sp').classList.remove('open');

  if(loaded[day]){
    // Already have data — instant smooth swap
    const cnt=games[day].length;
    document.getElementById('liveStatus').textContent=`${day===0?'📅 Today':'📆 Tomorrow'} · ${cnt} game${cnt!==1?'s':''}`;
    smoothRender();
  } else {
    // Need to load
    const main=document.getElementById('main');
    main.innerHTML=`<div class="spin-wrap"><div class="spin"></div><div class="spin-msg">Loading ${day===0?'today':'tomorrow'}'s games...</div></div>`;
    document.getElementById('dload').classList.add('show');
    loadDay(day);
  }
}

// ─── SMOOTH RENDER ────────────────────────────────────────────────────────────
function smoothRender(){
  const main=document.getElementById('main');
  main.style.transition='opacity 0.18s ease';
  main.style.opacity='0';
  setTimeout(()=>{
    renderGames();
    main.style.opacity='1';
  },180);
}

// ─── RENDER GAMES ─────────────────────────────────────────────────────────────
function renderGames(){
  const main=document.getElementById('main');
  const pickedSet=new Set(picks.map(p=>p.name));

  const filtered=games[curDay].map(g=>{
    let players=[...g.players];
    if(activeFilter==='hot')    players=players.filter(p=>calcOdds(p)>=50);
    if(activeFilter==='streak') players=players.filter(p=>p.streak>=2);
    if(activeFilter==='pp')     players=players.filter(p=>p.ppgPct>=0.27);
    if(activeFilter==='healthy')players=players.filter(p=>!p.injured);
    if(searchTerm) players=players.filter(p=>p.name.toLowerCase().includes(searchTerm)||p.team.toLowerCase().includes(searchTerm));
    players.sort((a,b)=>calcOdds(b)-calcOdds(a));
    return{...g,players};
  }).filter(g=>g.players.length>0);

  if(!filtered.length){
    main.innerHTML='<div class="empty">No players match — try a different filter!</div>';
    return;
  }

  main.innerHTML=filtered.map((g,gi)=>{
    const sb=g.status==='live'
      ? `<span class="gst st-live">● LIVE ${g.score||''}</span>`
      : `<span class="gst st-up">${curDay===0?'Tonight':'Tomorrow'}</span>`;

    const cards=g.players.map((p,pi)=>{
      const o=calcOdds(p), tc=tierCls(o);
      const isPicked=pickedSet.has(p.name);
      const isMaxed=!isPicked&&picks.length>=MAX_PICKS;
      const dots=(p.last5||[0,0,0,0,0]).map(v=>`<div class="d5${v?' s':''}"></div>`).join('');
      const stk=p.streak>=5?`<div class="stk stk-f">🔥 ${p.streak}-game streak</div>`:p.streak>=2?`<div class="stk stk-w">⚡ ${p.streak}-game streak</div>`:'';
      const injB=p.injured?`<div class="injb">🚑</div>`:'';
      const ppPill=p.ppgPct>=0.27?`<span class="pppill">PP</span>`:'';
      const sn=p.name.replace(/'/g,"\\'");
      const clickFn=p.injured
        ? `showToast('🚑 Player is injured','terr')`
        : isMaxed
        ? `showToast('⚠️ Max 3 picks! Remove one first.','terr')`
        : `togglePick('${sn}','${p.team}',${p.id||'null'})`;

      return `<div class="pcard${isPicked?' picked':''}${isMaxed?' maxed':''}${p.injured?' injured':''}"
          style="animation-delay:${(pi*0.035).toFixed(2)}s"
          onclick="${clickFn}">
        ${isPicked?'<div class="pchk">✓ PICKED</div>':''}
        <div class="hw">${hsEl(p.id,p.name)}${injB}</div>
        <div class="pi">
          <div class="pn">${p.name}</div>
          <div class="pm">
            <span class="tpill">${p.team}</span>
            <span class="postag">${p.pos}</span>
            ${ppPill}
            ${p.injured?'<span style="color:#f87171;font-size:0.61rem;font-weight:700">INJURED</span>':''}
          </div>
          <div class="srow">
            <span class="sc"><strong>${p.goals}</strong>G</span>
            <span class="sc"><strong>${p.gpg.toFixed(2)}</strong>/gm</span>
            <span class="sc"><strong>${p.spg.toFixed(1)}</strong>SOG</span>
            <span class="sc"><strong>${Math.round(p.ppgPct*100)}%</strong>PP</span>
          </div>
          <div class="l5">${dots}<span class="l5lbl">Last 5</span></div>
          ${stk}
        </div>
        <div class="oc ${tc}">
          <div class="on">${p.injured?'—':o+'%'}</div>
          <div class="otrack"><div class="ofill" style="width:${p.injured?0:o}%"></div></div>
          <div class="olbl">${p.injured?'out':'to score'}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="gsec" style="animation-delay:${(gi*0.06).toFixed(2)}s">
      <div class="ghdr">
        <div class="tlogos">${logoEl(g.away)}<span class="vs">@</span>${logoEl(g.home)}</div>
        <div class="mtxt">${g.matchup}</div>
        ${goalieTag(g.home)}
        ${sb}
        <div class="gtime">${g.time}</div>
      </div>
      <div class="pgrid">${cards}</div>
    </div>`;
  }).join('');
}

// ─── NHL API ──────────────────────────────────────────────────────────────────
const NHL='https://api-web.nhle.com/v1';
async function jf(url){
  const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchPlayers(abbrev,isHome,opp){
  try{
    const roster=await jf(`${NHL}/roster/${abbrev}/current`);
    const fwds=(roster.forwards||[]).slice(0,9);
    const list=await Promise.all(fwds.map(async pl=>{
      try{
        const land=await jf(`${NHL}/player/${pl.id}/landing`);
        const s=land?.featuredStats?.regularSeason?.subSeason||{};
        const gp=s.gamesPlayed||1, goals=s.goals||0;
        let last5=[0,0,0,0,0], streak=0;
        try{
          const gl=await jf(`${NHL}/player/${pl.id}/game-log/20252026/2`);
          const rec=(gl.gameLog||[]).slice(0,5);
          last5=rec.map(g=>(g.goals||0)>0?1:0);
          for(const g of rec){ if((g.goals||0)>0) streak++; else break; }
        }catch{}
        const injured=['IR','LTIR','DTD'].includes(pl.injuryStatus||'');
        return{id:pl.id,name:`${pl.firstName.default} ${pl.lastName.default}`,
          team:abbrev,opp,pos:pl.positionCode||'F',gp,goals,
          gpg:goals/gp, ppgPct:goals>0?(s.powerPlayGoals||0)/goals:0,
          spg:(s.shots||0)/gp, streak, last5, isHome, injured};
      }catch{return null;}
    }));
    return list.filter(p=>p&&p.goals>=3);
  }catch{return[];}
}

async function loadDay(day){
  try{
    const sched=await jf(`${NHL}/schedule/now`);
    const rawGames=(sched?.gameWeek?.[day]?.games||[])
      .filter(g=>['FUT','LIVE','CRIT','PRE','FINAL'].includes(g.gameState));
    if(!rawGames.length) throw new Error('no games for day '+day);

    if(day===curDay) document.getElementById('liveStatus').textContent=`Loading ${rawGames.length} games...`;

    const built=await Promise.all(rawGames.slice(0,12).map(async g=>{
      const[ap,hp]=await Promise.all([
        fetchPlayers(g.awayTeam.abbrev,false,g.homeTeam.abbrev),
        fetchPlayers(g.homeTeam.abbrev,true,g.awayTeam.abbrev)
      ]);
      const isLive=g.gameState==='LIVE'||g.gameState==='CRIT';
      return{
        matchup:`${g.awayTeam.abbrev} @ ${g.homeTeam.abbrev}`,
        away:g.awayTeam.abbrev, home:g.homeTeam.abbrev,
        time:g.startTimeUTC?toPT(g.startTimeUTC):'TBD',
        status:isLive?'live':'upcoming',
        score:isLive?`${g.awayTeam.score??0}–${g.homeTeam.score??0}`:null,
        players:[...ap,...hp]
      };
    }));

    const valid=built.filter(g=>g.players.length>0);
    if(!valid.length) throw new Error('no players');

    games[day]=valid;
    loaded[day]=true;
    document.getElementById('dload').classList.remove('show');

    if(day===curDay){
      document.getElementById('liveStatus').textContent=`✅ Live NHL data · ${day===0?'Today':'Tomorrow'} · ${valid.length} games`;
      smoothRender();
    }
  }catch(e){
    console.warn(`API fail day ${day}:`,e.message);
    document.getElementById('dload').classList.remove('show');
    if(day===0) fallbackDay0();
    else fallbackDay1();
  }
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  setTimeout(()=>document.getElementById('instb').classList.add('show'),4000);
});
document.getElementById('instbtn').addEventListener('click',()=>{
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; }
  document.getElementById('instb').classList.remove('show');
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadDay(0);
</script>
